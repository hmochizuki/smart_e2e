[package]
name = "smart_e2e_app"
version = "0.0.0"
description = "smart_e2e Tauri shell"
authors = ["smart_e2e"]
edition = "2021"
rust-version = "1.77"

[lib]
name = "smart_e2e_app_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tempfile = "3"

[dev-dependencies]
serde_json = "1"

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
